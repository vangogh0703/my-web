<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { background:#0d0d0d; color:#e0e0e0; font-family:"Microsoft YaHei",sans-serif; max-width:600px; margin:50px auto; padding:30px; }
    h1 { color:#00d4ff; }
    textarea, input, select { width:100%; padding:10px; background:#1a1a2e; color:#e0e0e0; border:1px solid #333; border-radius:6px; margin:8px 0; box-sizing:border-box; }
    button { padding:10px 20px; background:#00d4ff; color:#0d0d0d; border:none; border-radius:6px; font-weight:bold; cursor:pointer; }
    .post { background:#1a1a2e; padding:20px; border-radius:10px; margin:20px 0; }
    .post h2 { color:#7b68ee; margin:0 0 5px 0; }
    .post .date { color:#666; font-size:13px; margin-bottom:10px; }
    .post .body { line-height:1.8; }
    .del-btn { background:#ff4757; padding:4px 10px; font-size:13px; float:right; }
    .edit-btn { background:#ffa502; padding:4px 10px; font-size:13px; float:right; margin-right:6px; }
    .tag { display:inline-block; padding:2px 10px; border-radius:4px; font-size:12px; margin-right:8px; }
    .tag-飞行 { background:#ff6b6b; color:#fff; }
    .tag-学习 { background:#7b68ee; color:#fff; }
    .tag-生活 { background:#00d4ff; color:#0d0d0d; }
    #cancelBtn { background:#555; display:none; }
  </style>
</head>
<body>
  <h1>📝 我的博客</h1>

  <h3 id="formTitle">写新文章</h3>
  <input id="titleInput" placeholder="文章标题...">
  <select id="tagInput">
    <option value="飞行">飞行</option>
    <option value="学习">学习</option>
    <option value="生活">生活</option>
  </select>
  <textarea id="bodyInput" rows="6" placeholder="文章内容..."></textarea>
  <button onclick="publish()" id="publishBtn">发布</button>
  <button onclick="cancelEdit()" id="cancelBtn">取消</button>
  <input id="searchInput" placeholder="🔍 搜索文章..." oninput="filterPosts()">
  <div id="posts"></div>

  <script>
    var editingDiv = null;  // 正在编辑的文章 div，null 表示是新建模式

    window.onload = function() {
      var saved = JSON.parse(localStorage.getItem('blogPosts') || '[]');
      saved.forEach(function(post) { renderPost(post); });
    };

    function publish() {
      var title = document.getElementById('titleInput').value;
      var body  = document.getElementById('bodyInput').value;
      var tag   = document.getElementById('tagInput').value;
      if (!title || !body) return;

      if (editingDiv) {
        // 编辑模式：更新现有文章
        editingDiv.querySelector('h2').innerHTML = '<span class="tag tag-' + tag + '">' + tag + '</span>' + title;
        editingDiv.querySelector('.body').innerText = body;
        var oldTag = editingDiv.querySelector('.tag');
        if (oldTag) oldTag.className = 'tag tag-' + tag;
        resetForm();
        saveAll();
      } else {
        // 新建模式
        var post = { title: title, body: body, tag: tag, date: new Date().toLocaleDateString('zh-CN') };
        renderPost(post);
        savePost(post);
        resetForm();
      }
    }

    function renderPost(post) {
      var tagHtml = post.tag ? '<span class="tag tag-' + post.tag + '">' + post.tag + '</span>' : '';
      var div = document.createElement('div');
      div.className = 'post';
      div.innerHTML = '<button class="del-btn" onclick="delPost(this)">删除</button>' +
                      '<button class="edit-btn" onclick="editPost(this)">编辑</button>' +
                      '<h2>' + tagHtml + post.title + '</h2>' +
                      '<div class="date">' + post.date + '</div>' +
                      '<div class="body">' + post.body + '</div>';
      document.getElementById('posts').prepend(div);
    }

    function editPost(btn) {
      editingDiv = btn.parentElement;
      var title = editingDiv.querySelector('h2').innerText;    // 不含标签的文字
      var body  = editingDiv.querySelector('.body').innerText;
      var tagEl = editingDiv.querySelector('.tag');
      var tag   = tagEl ? tagEl.innerText : '飞行';

      document.getElementById('titleInput').value = title;
      document.getElementById('bodyInput').value = body;
      document.getElementById('tagInput').value = tag;
      document.getElementById('formTitle').innerText = '编辑文章';
      document.getElementById('publishBtn').innerText = '保存修改';
      document.getElementById('cancelBtn').style.display = 'inline-block';
    }

    function cancelEdit() {
      editingDiv = null;
      resetForm();
    }

    function resetForm() {
      editingDiv = null;
      document.getElementById('titleInput').value = '';
      document.getElementById('bodyInput').value = '';
      document.getElementById('formTitle').innerText = '写新文章';
      document.getElementById('publishBtn').innerText = '发布';
      document.getElementById('cancelBtn').style.display = 'none';
    }

    function delPost(btn) {
      btn.parentElement.remove();
      if (editingDiv === btn.parentElement) resetForm();
      saveAll();
    }

    function savePost(post) {
      var posts = JSON.parse(localStorage.getItem('blogPosts') || '[]');
      posts.unshift(post);
      localStorage.setItem('blogPosts', JSON.stringify(posts));
    }

    function saveAll() {
      var posts = [];
      document.querySelectorAll('.post').forEach(function(div) {
        posts.push({
          title: div.querySelector('h2').innerText,
          date: div.querySelector('.date').innerText,
          body: div.querySelector('.body').innerText,
          tag: div.querySelector('.tag') ? div.querySelector('.tag').innerText : ''
        });
      });
      localStorage.setItem('blogPosts', JSON.stringify(posts));
    }
function filterPosts() {
  var keyword = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.post').forEach(function(div) {
    var text = div.querySelector('h2').innerText + div.querySelector('.body').innerText;
    if (text.toLowerCase().indexOf(keyword) > -1) {
      div.style.display = 'block';
    } else {
      div.style.display = 'none';
    }
  });
}
  </script>
</body>
</html>
